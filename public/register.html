<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMatrix — Create Account</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .login-link { text-align: center; margin-top: 18px; font-size: 13px; color: var(--text-muted); }
    .login-link a { color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="login-logo">
        <div class="brand">P<span>MATRIX</span></div>
        <div class="tagline">Create Your Account</div>
      </div>

      <div id="alertBox"></div>

      <form id="registerForm">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="fullName" class="form-input" placeholder="John Doe" autocomplete="name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" id="phoneNumber" class="form-input" placeholder="+254712345678" autocomplete="tel" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Min. 6 characters" autocomplete="new-password" required>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat your password" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px" id="registerBtn">
          Create Account
        </button>
      </form>

      <div class="login-link">
        Already have an account? <a href="/">Sign in</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/register.js"></script>
</body>
</html>
