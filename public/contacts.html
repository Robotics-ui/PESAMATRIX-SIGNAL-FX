<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMatrix — Contacts</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-symbol">P</div>
        <div class="logo-name">P<span>MATRIX</span></div>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard.html" class="nav-link" data-page="dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <div class="nav-divider"></div>
        <a href="/media.html" class="nav-link" data-page="media">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Media Library
        </a>
        <a href="/contacts.html" class="nav-link" data-page="contacts">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.72A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
          Contacts
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-avatar" id="sidebarAvatar">U</div>
        <div class="user-meta">
          <span class="user-email" id="sidebarEmail"></span>
          <span class="user-role" id="sidebarRole"></span>
        </div>
        <button class="logout-btn" id="logoutBtn" title="Sign out">⏻</button>
      </div>
    </aside>

    <div class="main-content">
      <div class="topbar">
        <span class="topbar-title">Contacts</span>
        <span class="topbar-spacer"></span>
        <button class="btn btn-primary btn-sm" id="addContactBtn" style="display:none">+ Add Contact</button>
      </div>

      <div class="page-body">
        <div id="alertBox"></div>

        <div class="card" style="margin-bottom:20px;border-color:rgba(0,229,160,0.2)">
          <div style="display:flex;align-items:center;gap:14px">
            <div style="font-size:28px">📞</div>
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--text)">Need help? Reach out to support</div>
              <div style="font-size:12px;color:var(--text-muted);margin-top:3px">Our support team is available via phone and WhatsApp.</div>
            </div>
          </div>
        </div>

        <div class="contacts-grid" id="contactsGrid">
          <div class="empty-state" style="grid-column:1/-1">
            <div class="spinner"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="contactModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Add Contact</span>
        <button class="modal-close" id="modalCloseBtn">✕</button>
      </div>
      <form id="contactForm">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="fieldName" class="form-input" placeholder="e.g. PMatrix Support" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="text" id="fieldPhone" class="form-input" placeholder="+254712345678" required>
        </div>
        <div class="form-group">
          <label class="form-label">WhatsApp Number (optional)</label>
          <input type="text" id="fieldWhatsapp" class="form-input" placeholder="+254712345678">
        </div>
        <div class="form-group">
          <label class="form-label">Label</label>
          <input type="text" id="fieldLabel" class="form-input" placeholder="Support" value="Support" required>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:6px">
          <button type="button" class="btn btn-ghost" id="cancelBtn" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Contact</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/contacts.js"></script>
</body>
</html>
