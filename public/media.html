<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMatrix — Media Library</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-symbol">P</div>
        <div class="logo-name">P<span>MATRIX</span></div>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard.html" class="nav-link" data-page="dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <div class="nav-divider"></div>
        <a href="/media.html" class="nav-link" data-page="media">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Media Library
        </a>
        <a href="/contacts.html" class="nav-link" data-page="contacts">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.72A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
          Contacts
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-avatar" id="sidebarAvatar">U</div>
        <div class="user-meta">
          <span class="user-email" id="sidebarEmail"></span>
          <span class="user-role" id="sidebarRole"></span>
        </div>
        <button class="logout-btn" id="logoutBtn" title="Sign out">⏻</button>
      </div>
    </aside>

    <div class="main-content">
      <div class="topbar">
        <span class="topbar-title">Media Library</span>
        <span class="topbar-spacer"></span>
        <div style="display:flex;gap:10px;align-items:center">
          <span id="statImages" style="font-size:12px;color:var(--text-muted)">—</span>
          <span style="color:var(--text-muted);font-size:12px">images</span>
          <span id="statVideos" style="font-size:12px;color:var(--text-muted)">—</span>
          <span style="color:var(--text-muted);font-size:12px">videos</span>
          <span class="topbar-badge" id="statTotal">0</span>
        </div>
      </div>

      <div class="page-body">
        <div id="alertBox"></div>

        <div class="card" style="margin-bottom:20px">
          <div class="card-header" style="margin-bottom:14px">
            <div class="card-title">Upload File</div>
          </div>
          <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">⬆</div>
            <div style="font-size:14px;font-weight:600;color:var(--text-dim)">Drop a file here or click to browse</div>
            <div class="upload-hint">Supports JPG, PNG, GIF, WebP, MP4, WebM, MOV · Max 100 MB</div>
          </div>
          <div class="upload-progress" id="uploadProgress">
            <div class="upload-progress-bar" id="uploadProgressBar"></div>
          </div>
          <div style="margin-top:12px;display:flex;gap:10px;align-items:flex-end">
            <div class="form-group" style="flex:1;margin-bottom:0">
              <label class="form-label">Description (optional)</label>
              <input type="text" id="descInput" class="form-input" placeholder="Caption or note…">
            </div>
            <button class="btn btn-primary" id="uploadBtn" style="flex-shrink:0">Choose File</button>
          </div>
          <input type="file" id="fileInput" accept="image/*,video/*" style="display:none">
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">All Files</button>
            <button class="filter-tab" data-filter="image">Images</button>
            <button class="filter-tab" data-filter="video">Videos</button>
          </div>
        </div>

        <div class="media-grid" id="mediaGrid">
          <div class="empty-state" style="grid-column:1/-1">
            <div class="spinner"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/media.js"></script>
</body>
</html>
